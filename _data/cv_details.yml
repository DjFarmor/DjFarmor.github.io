# ----------------------------------------------------------------
# GITHUB REPOS (highlighted)
# ----------------------------------------------------------------
github_repos:
  - name: pyconscious
    url: https://github.com/andresni/pyconscious
    description: >
      Python package implementing a range of EEG-based measures of consciousness
      (Lempel-Ziv complexity, permutation entropy, integrated information proxies,
      and more). Used in multiple published studies.
    stars: 0

  - name: NYP (NEST YAML Platform)
    url: https://github.com/andresni/NYP
    description: >
      Python/YAML framework for parameterising and running large-scale
      thalamocortical neural network simulations in NEST. Handles network
      initialisation, simulation, and result plotting via YAML config files.
    stars: 0
