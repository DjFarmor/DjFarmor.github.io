# EMPLOYMENT
# ----------------------------------------------------------------
employment:
  - title: Researcher
    institution: Kongsberg Hospital
    city: Kongsberg
    start: 2025
    end: present
    description: >
      Responsible for funding applications and data analysis.
      PI: M.D. G. Ernst. Projects include a study on combination of
      ketamine and TMS for depression, and memory formation and awareness
      during propofol sedation.

  - title: Researcher / PhD Candidate
    institution: University of Oslo, Brain Signalling Group
    city: Oslo
    start: 2016
    end: present
    description: >
      Researcher from 2016; PhD candidate from 2020 with supervisors
      B. E. Juel & J. F. Storm (PI). PhD thesis defence: March 2026.
      Responsible for all aspects of the scientific process — study design,
      data acquisition, analysis, and writing. Projects span behavioural
      and pharmacological experiments and modelling/simulation of large-scale
      neural networks. Topics include anaesthesia, sleep, consciousness,
      psychedelics, and computational modelling of thalamocortical systems.
      Methods: TMS-EEG, ERP, anaesthesia administration, sleep deprivation,
      behavioural paradigms.

  - title: Researcher
    institution: University of Oslo, Hedonic Pharmacology Lab
    city: Oslo
    start: 2016
    end: 2016
    description: >
      PI: Prof. S. Leknes. Co-responsible for implementation and analysis;
      assisted in acquisition. Study on binocular rivalry, salience, and
      aggression using intranasal oxytocin administration, eyetracking,
      and behavioural paradigms.

  - title: Researcher
    institution: Innlandet Hospital Trust
    city: Hamar
    start: 2015
    end: 2016
    description: >
      PI: Assoc. Prof. T. Endestad. Main responsible for MRI, fMRI, and
      resting-state fMRI analysis, interpretation, manuscript writing, and
      submission. Psychological trauma study using MRI and fMRI.

  - title: Scientific Technician
    institution: University of Oslo
    city: Oslo
    start: 2014
    end: 2016
    description: >
      Multiple concurrent roles: (1) Scientific Technician (Assoc. Prof. R. Huster)
      — assisting in design, scripting, and implementation of multimodal EEG-fMRI
      neurofeedback; behavioural inhibition study using real-time fMRI and EEG.
      (2) Researcher (Hedonic Pharmacology Lab, PI: PhD S. Leknes) — consulting on
      design, scripting, acquisition, and analysis; craving and reward study using
      morphine administration, fMRI, rs-fMRI, biometrics, and behavioural paradigms.
      (3) Scientific Assistant (NKVTS/UiO, PI: PhD I. Blix) — main responsible for
      analysis; co-responsible for acquisition, interpretation, manuscript, and
      submission; psychological trauma study using MRI, fMRI, rs-fMRI,
      psychometrics, and behavioural paradigms.

  - title: ERP-Technician
    institution: Rikshospitalet (Oslo University Hospital)
    city: Oslo
    start: 2014
    end: 2014
    description: >
      PI: Prof. S. Andersson. Responsible for EEG acquisition and ERP analysis
      for diagnostic purposes.

  - title: Researcher
    institution: SafeeCom AS
    city: Oslo
    start: 2014
    end: 2014
    description: >
      PI: Dr. B. C. Østberg. Main responsible for prototyping of medical
      technologies — medical UWB radar scanner and vibrational diagnostic tool
      using Matlab and Arduino.

  - title: Lab Manager / Scientific Assistant
    institution: University of Oslo, Cognitive Laboratories
    city: Oslo
    start: 2012
    end: 2013
    description: >
      Lab manager (Assoc. Prof. T. Endestad): responsible for data acquisition,
      student lab days, analysis, booking, and IT communication.
      Scientific Assistant (PI: PhD I. Blix): co-responsible for fMRI/MRI
      acquisition including recent traffic accident survivors; psychological
      trauma study using MRI, fMRI, rs-fMRI, psychometrics, and behavioural
      paradigms.

