name: Build LaTeX CVs

on:
  push:
    paths:
      - 'files/cv.tex'
      - 'files/cv-short.tex'
      - '_publications/**'
      - '_talks/**'
      - '_teaching/**'
      - '_portfolio/**'
      - '_data/cv_details.yml'
      - 'scripts/generate_short_cv.py'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cvs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml python-frontmatter

      - name: Generate short CV from collections
        run: python scripts/generate_short_cv.py

      - name: Install LaTeX (lightweight)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive \
            texlive-latex-extra \
            texlive-fonts-recommended \
            cm-super \
            lmodern

      - name: Compile full CV (two passes)
        run: |
          cd files
          pdflatex -interaction=nonstopmode cv.tex
          pdflatex -interaction=nonstopmode cv.tex

      - name: Compile short CV (two passes)
        run: |
          cd files
          pdflatex -interaction=nonstopmode cv-short.tex
          pdflatex -interaction=nonstopmode cv-short.tex

      - name: Commit and push compiled PDFs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git rebase origin/master
          git add files/cv.pdf files/cv-short.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-build CV PDFs [skip ci]"
            git push origin master
          fi
